<div *ngIf="getLastPage() !== 0 && !dataLoading()" class="pagination-display">
    <nav>
        <ul class="pagination">
            <li class="page-item" class={{getPreviousPageButtonClass()}}>
                <a class="page-link" href="javascript:void(0)" (click)="setPageNum(-1, false)">&lt;&lt;</a>
            </li>
            <li *ngIf="shouldDisplayFirstPageOption()" class="page-item">
                <a class="page-link" href="javascript:void(0)" (click)="setPageNum(1, true)">1</a>
            </li>
            <li *ngIf="shouldDisplayEllipses(true)" class="page-item disabled">
                <a class="page-link" href="javascript:void(0)">&hellip;</a>
            </li>
            <li *ngFor="let page of getDisplayedPageRange()" class={{getPageItemClass(page)}}>
                <a class="page-link" href="javascript:void(0)" (click)="setPageNum(page, true)">{{page}}</a>
            </li>
            <li *ngIf="shouldDisplayEllipses(false)" class="page-item disabled">
                <a class="page-link" href="javascript:void(0)">&hellip;</a>
            </li>
            <li *ngIf="shouldDisplayLastPageOption()" class="page-item">
                <a class="page-link" href="javascript:void(0)" (click)="setPageNum(getLastPage(), true)">{{getLastPage()}}</a>
            </li>
            <li class="page-item" class={{getNextPageButtonClass()}}>
                <a class="page-link" href="javascript:void(0)" (click)="setPageNum(1, false)">&gt;&gt;</a>
            </li>
        </ul>
    </nav>
    <div class="pagination-display-page-size">
        <label for="page-size-select">Page Size:</label>
        <select id="page-size-select" class="form-select" (change)="handlePageSizeChange($event)" [disabled]="dataLoading()">
            <option *ngFor="let size of pageSizeOptions" [selected]="size === paginationData().pageSize" [value]="size">{{size}}</option>
        </select>
    </div>
</div>
